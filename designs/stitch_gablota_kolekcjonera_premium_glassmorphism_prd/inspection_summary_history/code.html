<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gablota Kolekcjonera - Inspection</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#e5aa34",
              "background-light": "#f8f7f6",
              "background-dark": "#211c11",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "body": ["system-ui", "-apple-system", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem", 
              "lg": "0.5rem", 
              "xl": "0.75rem", 
              "2xl": "1.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        /* Ambient Noise Overlay */
        .noise-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .glass-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        
        .rarity-gradient-text {
            background: linear-gradient(135deg, #e5aa34 0%, #ffdf99 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-background-dark text-gray-100 font-body min-h-screen overflow-x-hidden relative flex flex-col">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 z-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary/10 via-background-dark to-background-dark pointer-events-none"></div>
<div class="noise-bg"></div>
<!-- Minimal Header (Back to Main) -->
<header class="relative z-10 p-6 flex items-center w-full max-w-7xl mx-auto">
<button class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors group px-2 py-1 rounded-lg hover:bg-white/5">
<span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span class="font-medium tracking-wide text-sm uppercase">Return to Briefcase</span>
</button>
</header>
<!-- Main Content -->
<main class="relative z-10 flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col">
<div class="flex flex-col lg:flex-row gap-12 lg:gap-16 items-start">
<!-- Left Column: Summary Stats -->
<div class="w-full lg:w-5/12 flex flex-col gap-8">
<!-- Victory Header -->
<div class="space-y-2">
<h2 class="text-primary text-sm font-bold tracking-[0.2em] uppercase">Post-Match Debrief</h2>
<h1 class="font-display text-4xl sm:text-5xl font-bold leading-tight rarity-gradient-text drop-shadow-[0_0_15px_rgba(229,170,52,0.3)]">
                        OPERATION COMPLETE
                    </h1>
</div>
<!-- Stat Blocks -->
<div class="grid grid-cols-2 gap-4">
<div class="glass-panel rounded-2xl p-6 flex flex-col justify-center items-start relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="text-gray-400 text-xs font-medium uppercase tracking-[0.1em] mb-2 relative z-10">Time Elapsed</span>
<div class="font-display text-3xl sm:text-4xl font-bold text-white relative z-10 tracking-tight">02:45</div>
</div>
<div class="glass-panel rounded-2xl p-6 flex flex-col justify-center items-start relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="text-gray-400 text-xs font-medium uppercase tracking-[0.1em] mb-2 relative z-10">Moves Taken</span>
<div class="font-display text-3xl sm:text-4xl font-bold text-white relative z-10 tracking-tight">42</div>
</div>
</div>
<!-- Action CTA -->
<div class="pt-4">
<button class="glass-button w-full h-16 rounded-xl bg-primary text-background-dark font-display font-bold text-lg flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(229,170,52,0.2)]">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
                        Play Again
                    </button>
</div>
</div>
<!-- Right Column: History Ledger -->
<div class="w-full lg:w-7/12 flex flex-col gap-6">
<div class="flex items-center justify-between">
<h3 class="font-display text-xl font-semibold text-white">History Ledger</h3>
<span class="text-xs text-gray-500 font-mono tracking-widest uppercase">Local Data</span>
</div>
<div class="glass-panel rounded-2xl overflow-hidden w-full">
<!-- Desktop Table View (Hidden on smallest mobile, scrolls horizontally) -->
<div class="overflow-x-auto w-full">
<table class="w-full text-left whitespace-nowrap">
<thead>
<tr class="bg-black/40 border-b border-white/10">
<th class="px-6 py-4 text-gray-400 text-xs font-medium uppercase tracking-[0.1em]">Date</th>
<th class="px-6 py-4 text-gray-400 text-xs font-medium uppercase tracking-[0.1em]">Difficulty</th>
<th class="px-6 py-4 text-gray-400 text-xs font-medium uppercase tracking-[0.1em]">Time</th>
<th class="px-6 py-4 text-gray-400 text-xs font-medium uppercase tracking-[0.1em]">Moves</th>
</tr>
</thead>
<tbody class="divide-y divide-white/5">
<tr class="hover:bg-white/[0.02] transition-colors group">
<td class="px-6 py-5 font-mono text-sm text-gray-300">2023-10-26</td>
<td class="px-6 py-5">
<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-red-500/10 text-red-400 border border-red-500/20">
                                            Hard
                                        </span>
</td>
<td class="px-6 py-5 font-display text-sm font-medium text-white">02:45</td>
<td class="px-6 py-5 font-display text-sm font-medium text-gray-300">42</td>
</tr>
<tr class="hover:bg-white/[0.02] transition-colors group bg-white/[0.01]">
<td class="px-6 py-5 font-mono text-sm text-gray-300">2023-10-25</td>
<td class="px-6 py-5">
<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-purple-500/10 text-purple-400 border border-purple-500/20">
                                            Medium
                                        </span>
</td>
<td class="px-6 py-5 font-display text-sm font-medium text-white">01:30</td>
<td class="px-6 py-5 font-display text-sm font-medium text-gray-300">24</td>
</tr>
<tr class="hover:bg-white/[0.02] transition-colors group">
<td class="px-6 py-5 font-mono text-sm text-gray-300">2023-10-25</td>
<td class="px-6 py-5">
<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-blue-500/10 text-blue-400 border border-blue-500/20">
                                            Easy
                                        </span>
</td>
<td class="px-6 py-5 font-display text-sm font-medium text-white">00:55</td>
<td class="px-6 py-5 font-display text-sm font-medium text-gray-300">14</td>
</tr>
<!-- Example of Empty State (Commented out logically, but demonstrating structure)
                                <tr>
                                    <td colspan="4" class="px-6 py-12 text-center text-sm text-gray-500">
                                        No operational data found.
                                    </td>
                                </tr>
                                -->
</tbody>
</table>
</div>
</div>
</div>
</div>
</main>
</body></html>
