name: CI

on:
  push:
    branches: [main, master, '001-project-setup']
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Vitest
        run: pnpm test

      - name: Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E bootstrap (dev server)
        run: pnpm exec playwright test -c playwright.bootstrap.config.ts

      - name: E2E preview (build + quality + PWA)
        run: pnpm exec playwright test

      - name: Lint
        run: pnpm lint

  deploy:
    name: Deploy to Vercel
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy dist --prod --yes --token="$VERCEL_TOKEN"
